    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <style>
        #loading-screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(160deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            z-index: 9999;
            font-family: 'Inter', sans-serif;
            transition: opacity 0.5s ease;
        }

            #loading-screen.fadeout {
                opacity: 0;
                pointer-events: none;
            }

        .loading-photo {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            object-fit: cover;
            object-position: center top;
            border: 3px solid rgba(255,255,255,0.2);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            margin-bottom: 20px;
        }

        .loading-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .loading-subtitle {
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 300;
            color: rgba(255,255,255,0.5);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 32px;
        }

        .loading-bar-track {
            width: 160px;
            height: 2px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .loading-bar-fill {
            height: 100%;
            width: 40%;
            background: linear-gradient(90deg, #5C6BC0, #E91E63);
            border-radius: 2px;
        }

        .loading-status {
            font-size: 0.7rem;
            color: rgba(255,255,255,0.3);
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>

    <script>
        // --- LOGS DE DEBUG ---
        console.log("Iniciando processo de boot do Blazor...");

        Blazor.start({
            loadBootResource: function (type, name, defaultUri, integrity) {
                console.log(`Carregando recurso: ${name} (${type})`);
                return defaultUri;
            }
        }).then(() => {
            console.log("Blazor iniciado com sucesso!");
        }).catch(err => {
            console.error("ERRO FATAL NO BLAZOR:", err);
            // Se cair aqui, o erro do '<' vai aparecer detalhado
        });

        // --- SEU CÓDIGO DA TELA DE LOADING ---
        const statusMessages = ["Carregando...", "Preparando dados...", "Quase lá..."];
        let msgIndex = 0;
        const statusEl = document.getElementById('loading-status-text');
        const msgInterval = setInterval(() => {
            msgIndex = (msgIndex + 1) % statusMessages.length;
            if (statusEl) statusEl.textContent = statusMessages[msgIndex];
        }, 900);

        function removerLoadingScreen() {
            clearInterval(msgInterval);
            const screen = document.getElementById('loading-screen');
            if (screen) {
                screen.classList.add('fadeout');
                setTimeout(() => { if (screen.parentNode) screen.parentNode.removeChild(screen); }, 500);
            }
        }

        const observer = new MutationObserver(() => {
            const app = document.getElementById('app');
            // Verifica se o Blazor injetou conteúdo dentro da div app
            if (app && app.children.length > 1) {
                removerLoadingScreen();
                observer.disconnect();
            }
        });

        const appEl = document.getElementById('app');
        if (appEl) observer.observe(appEl, { childList: true });

        // Segurança para não travar na tela de loading se algo falhar silenciosamente
        setTimeout(() => {
            const screen = document.getElementById('loading-screen');
            if (screen) {
                console.warn("Remoção forçada da tela de loading por timeout.");
                removerLoadingScreen();
            }
        }, 15000);
    </script>
